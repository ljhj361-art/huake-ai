<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>华科慧创｜联系我们</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,170,255,0.22), transparent 26%),
        linear-gradient(180deg,#020817 0%,#04132a 42%,#061f46 72%,#020817 100%);
    }
    body::before{
      content:"";position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size:40px 40px;opacity:.18;pointer-events:none;
    }
    .wrap{width:92%;max-width:1200px;margin:auto;position:relative;z-index:1}
    .nav{display:flex;justify-content:space-between;align-items:center;padding:24px 0}
    .brand{display:flex;align-items:center;gap:14px}
    .brand img{width:54px;height:54px;border-radius:10px}
    .brand h1{font-size:22px}
    .menu{display:flex;gap:24px;flex-wrap:wrap}
    .menu a{color:#cfe6ff;text-decoration:none}
    .menu a:hover{color:#fff}
    .section{
      background:rgba(8,30,70,0.88);
      border:1px solid rgba(120,180,255,0.2);
      border-radius:22px;
      padding:30px;
      margin-bottom:22px;
    }
    .section h2{font-size:34px;margin-bottom:18px}
    .section p{line-height:2;color:#eaf2ff;font-size:16px;margin-bottom:14px}
    .contact-list{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
    .item{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(120,180,255,0.12);
      border-radius:16px;padding:20px;
    }
    .item h3{color:#9fd0ff;margin-bottom:10px}
    .footer{text-align:center;color:#8fbaff;font-size:14px;padding:20px 0 40px}
    @media(max-width:900px){
      .nav{flex-direction:column;align-items:flex-start;gap:16px}
      .contact-list{grid-template-columns:1fr}
      .section h2{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <div class="brand">
        <img src="标志.png" alt="华科慧创">
        <h1>华科慧创</h1>
      </div>
      <div class="menu">
        <a href="index.html">首页</a>
        <a href="about.html">公司介绍</a>
        <a href="project.html">项目介绍</a>
        <a href="team.html">核心团队</a>
        <a href="contact.html">联系我们</a>
      </div>
    </div>

    <div class="section">
      <h2>联系我们</h2>
      <p>欢迎洽谈产业合作、项目投资、技术交流与战略协同。</p>

      <div class="contact-list">
        <div class="item">
          <h3>公司名称</h3>
          <p>华科慧创</p>
        </div>
        <div class="item">
          <h3>联系邮箱</h3>
          <p>contact@huake.com</p>
        </div>
        <div class="item">
          <h3>联系电话</h3>
          <p>+86 000-0000-0000</p>
        </div>
        <div class="item">
          <h3>联系地址</h3>
          <p>中国 · 香港 / 中国内地</p>
        </div>
      </div>
    </div>

    <div class="footer">© 2026 华科慧创</div>
  </div>
</body>
</html>
